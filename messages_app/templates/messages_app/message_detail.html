{% extends "Main/base.html" %}

{% block content %}

<main class="container py-5">

    <h1 class="mb-4">Detalle del mensaje</h1>

    <div class="card shadow-sm rounded-4 p-4">
        <p><strong>De:</strong> {{ message.sender.username }}</p>
        <p><strong>Para:</strong> {{ message.receiver.username }}</p>
        <p><strong>Fecha:</strong> {{ message.created_at|date:"d/m/Y H:i" }}</p>
        <hr>
        <p>{{ message.content }}</p>
    </div>

    <div class="mt-3">
        <a href="{% url 'messages_app:inbox' %}" class="btn btn-secondary">
            Volver
        </a>
    </div>

</main>

{% endblock %}
