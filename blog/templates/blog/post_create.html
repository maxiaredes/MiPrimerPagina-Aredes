{% extends "blog/base.html" %}

{% block content %}

<main class="container py-5">

    <div class="text-center mb-5">
        <h2 class="fw-bold">Crear Nueva Publicación</h2>
        <p class="text-muted mt-3">
            Comparte tus experiencias de viaje con el mundo.
        </p>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <form method="post" class="card p-4 border-0 shadow-sm rounded-4" enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="d-flex justify-content-between mt-3">

                    <a href="{% url 'blog:post_list' %}" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        Publicar
                    </button>

                </div>

            </form>

        </div>

    </div>

</main>

{% endblock content %}
